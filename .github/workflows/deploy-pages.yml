name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - "ci/**"
      - "language.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      bundle_id:
        description: Export bundle id
        required: false
        default: ""
      modpack_tag:
        description: Modpack-Modern release tag
        required: false
        default: ""
  workflow_run:
    workflows: ["Export quests"]
    types: [completed]
    branches: ["main", "dev"]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load config
        run: bash ci/run.sh env

      - name: Download bundle
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.EXPORT_ARTIFACT_NAME }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Resolve bundle
        id: metadata
        env:
          BUNDLE_ID_INPUT: ${{ github.event.inputs.bundle_id }}
          MODPACK_TAG: ${{ github.event.inputs.modpack_tag }}
        run: bash ci/run.sh prepare-deploy

      - name: Resolve versions
        run: bash ci/run.sh print-versions

      - name: Install bundle
        env:
          BUNDLE_ID: ${{ steps.metadata.outputs.bundle_id }}
          ACQUIRE: ${{ github.event_name == 'workflow_run' && 'extract' || 'fetch' }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash ci/run.sh install-bundle

      - name: Fetch QuestBook React site
        run: bash ci/run.sh fetch-quest-site

      - name: Assemble deploy site
        run: bash ci/run.sh assemble-deploy-site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.SITE_OUTPUT_DIR }}

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
